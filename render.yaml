services:
  # Backend Service
  - type: web
    name: quanlytiendo-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://quanlytiendo-frontend.onrender.com
      - key: MONGO_URI
        sync: false # Set this in the Render Dashboard securely
      - key: JWT_SECRET
        sync: false # Generate a strong random string
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: GOOGLE_CLIENT_EMAIL

        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false

  # Frontend Static Site
  - type: static
    name: quanlytiendo-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://quanlytiendo-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
